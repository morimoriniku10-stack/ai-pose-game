<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="カメラでポーズを真似してクリアするAIゲーム" />
  <meta property="og:title" content="POSE" />
  <meta property="og:description" content="カメラでポーズを真似してクリアするAIゲーム" />
  <meta property="og:type" content="website" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />

  <title>POSE</title>

  <script type="module">
    const MP_CDNS = [
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14",
      "https://unpkg.com/@mediapipe/tasks-vision@0.10.14"
    ];

    async function loadMediaPipeLibrary() {
      let lastError = null;
      for (const cdn of MP_CDNS) {
        try {
          const {
            FaceLandmarker,
            PoseLandmarker,
            FilesetResolver,
            DrawingUtils
          } = await import(`${cdn}/vision_bundle.mjs`);

          window.MP = { FaceLandmarker, PoseLandmarker, FilesetResolver, DrawingUtils, CDN: cdn };
          window.dispatchEvent(new Event("mediapipe-ready"));
          return;
        } catch (err) {
          lastError = err;
          console.warn("[AI] CDN 失敗:", cdn, err);
        }
      }
      window.dispatchEvent(new CustomEvent("mediapipe-error", { detail: lastError }));
    }

    loadMediaPipeLibrary();
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #0a0a0f;
      --surface:    #12121a;
      --surface2:   #1a1a26;
      --neon-cyan:  #00f5ff;
      --neon-pink:  #ff2d78;
      --neon-lime:  #b8ff2e;
      --text-hi:    #e8eaf0;
      --text-lo:    #6b7280;
      --font-mono:  'Share Tech Mono', 'Courier New', monospace;
      --radius:     12px;
      --scan-speed: 3s;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-hi);
      font-family: var(--font-mono);
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #camera-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }

    #guide-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      transform: scaleX(-1);
    }

    #guide-overlay.guide-active { display: block; }

    .guide-duo-badge {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,45,120,0.85);
      color: #fff;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 13px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      box-shadow: 0 0 16px rgba(255,45,120,0.5);
    }

    #camera-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    #ui-layer {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      background: linear-gradient(to bottom, rgba(10,10,15,0.85), transparent);
    }

    #level-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--neon-cyan);
      text-transform: uppercase;
    }

    #level-num {
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
      color: var(--text-hi);
      text-shadow: 0 0 16px var(--neon-cyan);
    }

    #score-display {
      text-align: right;
    }

    #score-label {
      font-size: 10px;
      color: var(--text-lo);
      letter-spacing: 0.15em;
    }

    #score-val {
      font-size: 24px;
      color: var(--neon-lime);
      text-shadow: 0 0 12px var(--neon-lime);
    }

    #mission-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 12px;
      gap: 6px;
    }

    #mission-emoji {
      font-size: 72px;
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(0,245,255,0.5));
      animation: floatEmoji 2.4s ease-in-out infinite;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @media (prefers-reduced-motion: reduce) {
      #mission-emoji { animation: none; }
    }

    #mission-title {
      font-size: 20px;
      letter-spacing: 0.1em;
      color: var(--text-hi);
      text-shadow: 0 0 10px var(--neon-cyan);
    }

    #mission-hint {
      font-size: 12px;
      color: var(--text-lo);
      letter-spacing: 0.08em;
    }

    #footer {
      padding: 12px 20px 24px;
      background: linear-gradient(to top, rgba(10,10,15,0.9), transparent);
      width: 100%;
    }

    #gauge-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-lo);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }

    #gauge-track {
      width: 100%;
      height: 8px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(0,245,255,0.15);
    }

    #gauge-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-lime));
      transition: width 0.15s ease-out;
      box-shadow: 0 0 8px var(--neon-cyan);
    }

    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      background: linear-gradient(160deg, #fff5f7 0%, #ffe8f0 35%, #fff9e6 100%);
      font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
      overflow-y: auto;
    }

    .start-card {
      width: 100%;
      max-width: 340px;
      background: #fff;
      border-radius: 28px;
      padding: 36px 28px 32px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(255, 105, 135, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-mark {
      font-size: 80px;
      line-height: 1;
      animation: bounceEmoji 1.6s ease-in-out infinite;
    }

    @keyframes bounceEmoji {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-10px) scale(1.05); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-mark { animation: none; }
    }

    .game-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #2d2a32;
      line-height: 1.3;
    }

    .game-subtitle {
      font-size: 15px;
      font-weight: 400;
      color: #7a7380;
      line-height: 1.7;
    }

    .start-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b9d, #ffa94d);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }

    .start-note {
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
    }

    #start-screen .btn-primary {
      font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.06em;
      padding: 18px 56px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff6b9d, #ff4081);
      color: #fff;
      box-shadow: 0 8px 24px rgba(255, 64, 129, 0.35);
      text-transform: none;
      width: 100%;
      max-width: 280px;
    }

    #start-screen .btn-primary:hover {
      filter: brightness(1.08);
    }

    #start-screen .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    #compat-warning {
      display: none;
      width: 100%;
      max-width: 340px;
      background: #fff3f3;
      border: 1px solid #ffb4b4;
      border-radius: 16px;
      padding: 14px 16px;
      font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
      font-size: 13px;
      color: #8b3a3a;
      line-height: 1.7;
      text-align: left;
    }

    #compat-warning.visible {
      display: block;
    }

    #compat-warning strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .btn {
      pointer-events: auto;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: filter 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--neon-cyan);
      color: var(--bg);
      font-size: 16px;
      padding: 16px 48px;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(0,245,255,0.4);
    }

    .btn-primary:hover { filter: brightness(1.15); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-hi);
      font-size: 14px;
      padding: 12px 28px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-secondary:hover { filter: brightness(1.2); }

    .btn-share {
      background: linear-gradient(135deg, #1da1f2, #0d8ecf);
      color: #fff;
      font-size: 14px;
      padding: 12px 28px;
      box-shadow: 0 0 16px rgba(29,161,242,0.4);
    }

    .share-section {
      width: 100%;
    }

    .share-label {
      font-size: 11px;
      color: var(--text-lo);
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .sns-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .sns-btn {
      pointer-events: auto;
      border: none;
      border-radius: 10px;
      padding: 10px 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      letter-spacing: 0.05em;
      transition: filter 0.15s, transform 0.1s;
    }

    .sns-btn:active { transform: scale(0.95); }
    .sns-line      { background: #06c755; }
    .sns-x         { background: #000; }
    .sns-instagram { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af); }
    .sns-tiktok    { background: #010101; border: 1px solid #25f4ee; color: #25f4ee; }
    .sns-facebook  { background: #1877f2; }
    .sns-native    { background: var(--surface2); color: var(--text-hi); border: 1px solid rgba(255,255,255,0.15); }

    #clear-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 80;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
    }

    #clear-modal.visible { display: flex; }

    .modal-card {
      background: var(--surface);
      border: 1px solid rgba(0,245,255,0.25);
      border-radius: 20px;
      padding: 24px 20px;
      width: 90%;
      max-width: 360px;
      max-height: 90vh;
      overflow-y: auto;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,245,255,0.15);
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #clear-level-tag {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--neon-cyan);
      text-transform: uppercase;
    }

    #clear-heading {
      font-size: 30px;
      color: var(--neon-lime);
      text-shadow: 0 0 20px var(--neon-lime);
    }

    #clear-emoji-display {
      font-size: 52px;
    }

    #capture-thumb-wrap {
      display: none;
      width: 112px;
      margin: 0 auto;
      cursor: pointer;
      pointer-events: auto;
    }

    #capture-preview {
      width: 112px;
      height: 84px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 2px solid rgba(0,245,255,0.4);
      display: block;
      box-shadow: 0 0 12px rgba(0,245,255,0.2);
      transition: transform 0.15s;
    }

    #capture-thumb-wrap:active #capture-preview {
      transform: scale(0.96);
    }

    .capture-tap-hint {
      display: block;
      font-size: 10px;
      color: var(--text-lo);
      margin-top: 5px;
      letter-spacing: 0.06em;
    }

    #photo-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 95;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }

    #photo-lightbox.visible {
      display: flex;
    }

    #photo-lightbox-img {
      max-width: 100%;
      max-height: 72vh;
      border-radius: var(--radius);
      border: 2px solid rgba(0,245,255,0.45);
      box-shadow: 0 0 32px rgba(0,245,255,0.2);
    }

    #photo-lightbox-close {
      pointer-events: auto;
      background: var(--surface2);
      color: var(--text-hi);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 10px 28px;
      font-family: var(--font-mono);
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    /* 将来の広告枠（現在は非表示・レイアウト確保用） */
    #ad-slot {
      display: none;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .modal-actions .btn-primary {
      flex: 1;
      min-width: 140px;
    }

    .modal-actions .btn-secondary {
      flex: 1;
      min-width: 100px;
    }

    #permission-error {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }

    #permission-error.visible { display: flex; }

    #permission-error .err-icon { font-size: 48px; }
    #permission-error .err-title { font-size: 18px; color: var(--neon-pink); }
    #permission-error .err-msg   { font-size: 13px; color: var(--text-lo); line-height: 1.8; }

    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(10,10,15,0.9);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #loading-overlay.visible { display: flex; }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,245,255,0.2);
      border-top-color: var(--neon-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: var(--text-lo);
      letter-spacing: 0.1em;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 50% { opacity: 0.3; } }

    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particleFly 0.8s ease-out forwards;
      z-index: 75;
    }

    @keyframes particleFly {
      from { opacity: 1; transform: translate(0,0) scale(1); }
      to   { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
    }
  </style>
</head>
<body>

<div id="start-screen">
  <div class="start-card">
    <div class="logo-mark">🤸</div>
    <span class="start-badge">無料で遊べる！</span>
    <h1 class="game-title">POSE</h1>
    <p class="game-subtitle">
      カメラの前でポーズを決めるだけ！<br>
      AIがリアルタイムで判定します
    </p>
    <button class="btn btn-primary" id="start-btn">はじめる</button>
    <div id="compat-warning" role="alert"></div>
    <p class="start-note">
      カメラの許可が必要です<br>
      明るい場所で遊んでね<br>
      <span style="font-size:10px;color:#ccc">iOS 15+ / Android 9+ 推奨</span>
    </p>
  </div>
</div>

<div id="app" style="display:none">
  <div id="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas-overlay"></canvas>
    <div id="guide-overlay" class="guide-overlay" aria-hidden="true"></div>
  </div>

  <div id="ui-layer">
    <header id="header">
      <div>
        <div id="level-label">LEVEL</div>
        <div id="level-num">1</div>
      </div>
      <div id="score-display">
        <div id="score-label">SCORE</div>
        <div id="score-val">0</div>
      </div>
    </header>

    <div id="mission-area">
      <div id="mission-emoji">😂</div>
      <div id="mission-title">大爆笑</div>
      <div id="mission-hint">口角を上げて笑顔に！</div>
    </div>

    <footer id="footer">
      <div id="gauge-label">
        <span>CONFIDENCE</span>
        <span id="gauge-percent">0%</span>
      </div>
      <div id="gauge-track">
        <div id="gauge-fill"></div>
      </div>
    </footer>
  </div>
</div>

<div id="clear-modal">
  <div class="modal-card">
    <div id="clear-level-tag">LEVEL 1 CLEAR!</div>
    <div id="clear-heading">🎉 CLEAR!</div>
    <div id="clear-emoji-display"></div>

    <div id="capture-thumb-wrap">
      <img id="capture-preview" alt="クリア時のポーズ" />
      <span class="capture-tap-hint">タップで拡大 🔍</span>
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" id="next-btn" style="pointer-events:auto">NEXT →</button>
      <button class="btn btn-secondary" id="retry-btn" style="pointer-events:auto">もう一度</button>
    </div>

    <div class="share-section">
      <p class="share-label">SNSでシェア</p>
      <div class="sns-grid">
        <button class="sns-btn sns-line" data-sns="line">LINE</button>
        <button class="sns-btn sns-x" data-sns="x">X</button>
        <button class="sns-btn sns-instagram" data-sns="instagram">Instagram</button>
        <button class="sns-btn sns-tiktok" data-sns="tiktok">TikTok</button>
        <button class="sns-btn sns-facebook" data-sns="facebook">Facebook</button>
        <button class="sns-btn sns-native" data-sns="native">その他</button>
      </div>
    </div>

    <!-- 将来: バナー広告 / 動画広告をここに挿入 -->
    <div id="ad-slot" hidden aria-hidden="true"></div>
  </div>
</div>

<div id="photo-lightbox">
  <img id="photo-lightbox-img" alt="クリア時のポーズ（拡大）" />
  <button type="button" id="photo-lightbox-close">✕ 閉じる</button>
</div>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">AI INITIALIZING...</div>
</div>

<div id="permission-error">
  <div class="err-icon">📷</div>
  <div class="err-title">カメラを使用できません</div>
  <div class="err-msg">
    ブラウザの設定からカメラのアクセスを許可してください。<br>
    iOSの場合：設定 → Safari → カメラ → 許可
  </div>
  <button class="btn btn-primary" onclick="location.reload()" style="pointer-events:auto">再試行</button>
</div>

<script src="/levels.js"></script>
<script src="/ar-fx.js"></script>
<script>
const GameState = {
  currentLevelIndex: 0,
  score: 0,
  holdCount: 0,
  isCleared: false,
  isRunning: false,
  animFrameId: null
};

function currentLevel() {
  return LEVELS[GameState.currentLevelIndex];
}

let faceLandmarker = null;
let poseLandmarker = null;
let visionTask = null;
let faceInitPromise = null;
let poseInitPromise = null;

const FACE_MODELS = [
  "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
];
const POSE_MODELS = [
  "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker.task"
];

function isInAppBrowser() {
  const ua = navigator.userAgent;
  return /Line\//i.test(ua)
    || /Instagram/i.test(ua)
    || /FBAN|FBAV/i.test(ua)
    || /Twitter/i.test(ua)
    || /MicroMessenger/i.test(ua);
}

function checkCompatibility() {
  const issues = [];

  if (!window.isSecureContext) {
    issues.push({
      blocking: true,
      title: "HTTPS接続が必要です",
      message: "カメラを使うには安全な接続（https://）で開いてください。"
    });
  }

  if (typeof WebAssembly !== "object") {
    issues.push({
      blocking: true,
      title: "ブラウザ非対応",
      message: "お使いのブラウザはAI機能に対応していません。Safari または Chrome の最新版をお試しください。"
    });
  }

  if (!navigator.mediaDevices?.getUserMedia) {
    issues.push({
      blocking: true,
      title: "カメラ非対応",
      message: "このブラウザではカメラを利用できません。"
    });
  }

  if (isInAppBrowser()) {
    issues.push({
      blocking: true,
      title: "アプリ内ブラウザでは動作しません",
      message: "LINE・Instagram 等のアプリ内ブラウザではカメラやAIが使えないことがあります。Safari または Chrome で直接開いてください。"
    });
  }

  return {
    ok: !issues.some(i => i.blocking),
    issues
  };
}

function showCompatibilityResult(result) {
  const $warn = document.getElementById("compat-warning");
  const $btn = document.getElementById("start-btn");

  if (result.ok) {
    $warn.classList.remove("visible");
    $warn.innerHTML = "";
    $btn.disabled = false;
    return;
  }

  const blocking = result.issues.filter(i => i.blocking);
  $warn.innerHTML = blocking.map(i =>
    `<strong>${i.title}</strong>${i.message}`
  ).join("<br><br>");
  $warn.classList.add("visible");
  $btn.disabled = true;
}

function isIOS() {
  return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function isMobile() {
  return isIOS() || /Android/i.test(navigator.userAgent);
}

function getDelegates() {
  if (isMobile()) return ["CPU"];
  return ["GPU", "CPU"];
}

function waitForMediaPipe(timeoutMs = 60000) {
  if (window.MP) return Promise.resolve(window.MP);
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      reject(new Error("AIライブラリの読み込みがタイムアウトしました"));
    }, timeoutMs);

    window.addEventListener("mediapipe-ready", () => {
      clearTimeout(timer);
      resolve(window.MP);
    }, { once: true });

    window.addEventListener("mediapipe-error", (e) => {
      clearTimeout(timer);
      reject(e.detail || new Error("AIライブラリの読み込みに失敗しました"));
    }, { once: true });
  });
}

async function withRetry(label, fn, retries = 3) {
  let lastError = null;
  for (let i = 0; i < retries; i++) {
    try {
      return await fn();
    } catch (err) {
      lastError = err;
      console.warn(`[AI] ${label} 失敗 (${i + 1}/${retries}):`, err);
      if (i < retries - 1) {
        await new Promise(r => setTimeout(r, 1200 * (i + 1)));
      }
    }
  }
  throw lastError;
}

async function getVisionTask() {
  if (visionTask) return visionTask;
  await waitForMediaPipe(isMobile() ? 90000 : 60000);

  // CDNからWASMを読み込む（ローカルキャッシュなし・シンプル構成）
  const wasmBase = `${window.MP.CDN}/wasm`;
  try {
    visionTask = await window.MP.FilesetResolver.forVisionTasks(wasmBase);
    console.log("[AI] WASM 読込成功:", wasmBase);
    return visionTask;
  } catch (err) {
    visionTask = null;
    throw err || new Error("WASM の読み込みに失敗しました");
  }
}

async function createFaceLandmarker(vision, delegate, modelPath) {
  return window.MP.FaceLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: modelPath, delegate },
    outputFaceBlendshapes: true,
    runningMode: "VIDEO",
    numFaces: 2
  });
}

async function createPoseLandmarker(vision, delegate, modelPath) {
  return window.MP.PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: modelPath, delegate },
    runningMode: "VIDEO",
    numPoses: 2
  });
}

async function loadFaceLandmarker(vision, delegate) {
  let lastError = null;
  for (const modelPath of FACE_MODELS) {
    try {
      return await withRetry(
        `FaceLandmarker/${delegate}/${modelPath}`,
        () => createFaceLandmarker(vision, delegate, modelPath)
      );
    } catch (err) {
      lastError = err;
      console.warn("[AI] 顔モデル失敗:", modelPath, err);
    }
  }
  throw lastError || new Error("顔認識モデルの読み込みに失敗しました");
}

async function loadPoseLandmarker(vision, delegate) {
  let lastError = null;
  for (const modelPath of POSE_MODELS) {
    try {
      return await withRetry(
        `PoseLandmarker/${delegate}/${modelPath}`,
        () => createPoseLandmarker(vision, delegate, modelPath)
      );
    } catch (err) {
      lastError = err;
      console.warn("[AI] ポーズモデル失敗:", modelPath, err);
    }
  }
  throw lastError || new Error("ポーズモデルの読み込みに失敗しました");
}

async function ensureFaceLandmarker() {
  if (faceLandmarker) return true;
  if (faceInitPromise) return faceInitPromise;

  faceInitPromise = (async () => {
    try {
      const vision = await getVisionTask();
      for (const delegate of getDelegates()) {
        try {
          setLoadingText(`顔認識モデル読込中 (${delegate})...`);
          faceLandmarker = await loadFaceLandmarker(vision, delegate);
          console.log(`[AI] FaceLandmarker 完了 (${delegate})`);
          return true;
        } catch (err) {
          console.warn(`[AI] FaceLandmarker ${delegate} 失敗:`, err);
          faceLandmarker = null;
        }
      }
      throw new Error("顔認識モデルの読み込みに失敗しました");
    } catch (err) {
      faceInitPromise = null;
      throw err;
    }
  })();

  return faceInitPromise;
}

async function ensurePoseLandmarker() {
  if (poseLandmarker) return true;
  if (poseInitPromise) return poseInitPromise;

  poseInitPromise = (async () => {
    try {
      const vision = await getVisionTask();
      for (const delegate of getDelegates()) {
        try {
          setLoadingText(`ポーズモデル読込中 (${delegate})...`);
          poseLandmarker = await loadPoseLandmarker(vision, delegate);
          console.log(`[AI] PoseLandmarker 完了 (${delegate})`);
          return true;
        } catch (err) {
          console.warn(`[AI] PoseLandmarker ${delegate} 失敗:`, err);
          poseLandmarker = null;
        }
      }
      throw new Error("ポーズモデルの読み込みに失敗しました");
    } catch (err) {
      poseInitPromise = null;
      throw err;
    }
  })();

  return poseInitPromise;
}

async function ensureDetectorForLevel(level) {
  showLoading(true);
  try {
    const needsFace = level.type === "face" || level.type === "both";
    const needsPose = level.type === "pose" || level.type === "both";
    if (needsFace && !(await ensureFaceLandmarker())) return false;
    if (needsPose && !(await ensurePoseLandmarker())) return false;
    return true;
  } catch (err) {
    console.error("[AI] モデル読込失敗:", err);
    showCompatibilityResult({
      ok: false,
      issues: [{
        blocking: true,
        title: "AIモデルの読み込みに失敗しました",
        message: "Wi-Fiで接続し、ページを再読み込みしてお試しください。低電力モードをオフにすると改善することがあります。"
      }]
    });
    return false;
  } finally {
    showLoading(false);
    setLoadingText("AI INITIALIZING...");
  }
}

  if (el) el.textContent = text;

const $video      = document.getElementById("video");
const $canvas     = document.getElementById("canvas-overlay");
const $gaugeFill  = document.getElementById("gauge-fill");
const $gaugePct   = document.getElementById("gauge-percent");
const $missionEmoji = document.getElementById("mission-emoji");
const $missionTitle = document.getElementById("mission-title");
const $missionHint  = document.getElementById("mission-hint");
const $levelNum   = document.getElementById("level-num");
const $scoreVal   = document.getElementById("score-val");
const ctx         = $canvas.getContext("2d");

async function startCamera() {
  // 既存ストリームがあれば停止してから再起動（リプレイ時の二重起動防止）
  if ($video.srcObject) {
    $video.srcObject.getTracks().forEach(t => t.stop());
    $video.srcObject = null;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: { ideal: isMobile() ? 640 : 1280 },
        height: { ideal: isMobile() ? 480 : 720 }
      },
      audio: false
    });

    $video.srcObject = stream;
    await new Promise(resolve => $video.addEventListener("loadedmetadata", resolve, { once: true }));
    await $video.play();

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    console.log("[Camera] カメラ起動完了");
  } catch (err) {
    console.error("[Camera] カメラエラー:", err);
    document.getElementById("permission-error").classList.add("visible");
  }
}

function resizeCanvas() {
  $canvas.width  = window.innerWidth;
  $canvas.height = window.innerHeight;
}

async function resumeCamera() {
  if (!$video.srcObject) return;
  try {
    if ($video.paused) await $video.play();
    lastTimestamp = -1;
  } catch (err) {
    console.warn("[Camera] 再開失敗:", err);
  }
}

function releaseFaceLandmarker() {
  if (faceLandmarker) {
    try { faceLandmarker.close(); } catch (e) { /* ignore */ }
    faceLandmarker = null;
    faceInitPromise = null;
  }
}

function releasePoseLandmarker() {
  if (poseLandmarker) {
    try { poseLandmarker.close(); } catch (e) { /* ignore */ }
    poseLandmarker = null;
    poseInitPromise = null;
  }
}

async function restartCameraStream() {
  if ($video.srcObject) {
    $video.srcObject.getTracks().forEach(t => t.stop());
    $video.srcObject = null;
  }
  lastTimestamp = -1;
  await startCamera();
}

function resetClearModalPreview() {

function drawGuideFrame(level, tracked) {
  if (!tracked) {
    drawLevelGuide(ctx, level, $canvas.width, $canvas.height);
  }
}

let lastTimestamp = -1;
let lastFaceResult = null;
let lastPoseResult = null;

function detectionLoop() {
  if (!GameState.isRunning) return;

  const timestamp = performance.now();
  if (timestamp === lastTimestamp) {
    GameState.animFrameId = requestAnimationFrame(detectionLoop);
    return;
  }
  lastTimestamp = timestamp;

  const level = currentLevel();

  if ($video.paused || $video.readyState < 2 || !$video.videoWidth) {
    resumeCamera();
    GameState.animFrameId = requestAnimationFrame(detectionLoop);
    return;
  }

  ctx.clearRect(0, 0, $canvas.width, $canvas.height);

  const needsFace = level.type === "face" || level.type === "both";
  const needsPose = level.type === "pose" || level.type === "both";

  if (needsFace && faceLandmarker) {
    lastFaceResult = faceLandmarker.detectForVideo($video, timestamp);
  } else {
    lastFaceResult = null;
  }

  if (needsPose && poseLandmarker) {
    lastPoseResult = poseLandmarker.detectForVideo($video, timestamp);
  } else {
    lastPoseResult = null;
  }

  const tracked = drawTrackedLevelFX(
    ctx, level, lastFaceResult, lastPoseResult, $canvas.width, $canvas.height
  );

  drawGuideFrame(level, tracked);

  if (lastFaceResult?.faceLandmarks) {
    lastFaceResult.faceLandmarks.forEach(lm => drawFaceLandmarks(lm, tracked));
  }
  if (lastPoseResult?.landmarks) {
    lastPoseResult.landmarks.forEach(lm => drawPoseLandmarks(lm, tracked));
  }

  let confidence = evaluateDetection(level, lastFaceResult, lastPoseResult);

  if (level.players >= 2) {
    const count = level.type === "face"
      ? (lastFaceResult?.faceLandmarks?.length ?? 0)
      : (lastPoseResult?.landmarks?.length ?? 0);
    if (count < 2) confidence = Math.min(confidence, 0.35);
  }

  updateGauge(confidence);

  if (!GameState.isCleared) {
    if (confidence >= level.clearThreshold) {
      GameState.holdCount++;
      if (GameState.holdCount >= level.holdFrames) {
        handleClear();
        return;
      }
    } else {
      GameState.holdCount = Math.max(0, GameState.holdCount - 2);
    }
  }

  GameState.animFrameId = requestAnimationFrame(detectionLoop);
}

function drawFaceLandmarks(landmarks, fxActive) {
  if (fxActive) return;

  const FACE_MESH = [
    [33,133],[133,362],[362,263],[263,33],
    [61,291],[291,375],[375,61],
    [159,386],[386,14],[14,159]
  ];

  ctx.save();
  ctx.shadowColor = "rgba(0,245,255,0.9)";
  ctx.shadowBlur = 8;
  ctx.strokeStyle = "rgba(0,245,255,0.65)";
  ctx.lineWidth = 1.5;

  for (const [a, b] of FACE_MESH) {
    const lmA = landmarks[a], lmB = landmarks[b];
    if (!lmA || !lmB) continue;
    ctx.beginPath();
    ctx.moveTo((1 - lmA.x) * $canvas.width, lmA.y * $canvas.height);
    ctx.lineTo((1 - lmB.x) * $canvas.width, lmB.y * $canvas.height);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(0,245,255,0.92)";
  for (const lm of landmarks) {
    const x = (1 - lm.x) * $canvas.width;
    const y = lm.y * $canvas.height;
    ctx.beginPath();
    ctx.arc(x, y, 2.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawPoseLandmarks(landmarks, fxActive) {
  if (!landmarks) return;
  if (fxActive) return;

  const CONNECTIONS = [
    [11,12],[11,13],[13,15],[12,14],[14,16],
    [11,23],[12,24],[23,24],
    [23,25],[25,27],[24,26],[26,28]
  ];

  ctx.save();
  ctx.shadowColor = "rgba(184,255,46,0.8)";
  ctx.shadowBlur = 10;
  ctx.strokeStyle = "rgba(0,245,255,0.75)";
  ctx.lineWidth = 3;

  for (const [a, b] of CONNECTIONS) {
    const lmA = landmarks[a], lmB = landmarks[b];
    if (!lmA || !lmB) continue;
    if (lmA.visibility < 0.5 || lmB.visibility < 0.5) continue;
    const ax = (1 - lmA.x) * $canvas.width;
    const ay = lmA.y * $canvas.height;
    const bx = (1 - lmB.x) * $canvas.width;
    const by = lmB.y * $canvas.height;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(184,255,46,0.95)";
  for (const lm of landmarks) {
    if (lm.visibility < 0.5) continue;
    const x = (1 - lm.x) * $canvas.width;
    const y = lm.y * $canvas.height;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function updateGauge(confidence) {
  const pct = Math.round(confidence * 100);
  $gaugeFill.style.width = `${pct}%`;
  $gaugePct.textContent  = `${pct}%`;

  if (pct >= 90) {
    $gaugeFill.style.background = "linear-gradient(90deg, var(--neon-lime), #fff)";
  } else {
    $gaugeFill.style.background = "linear-gradient(90deg, var(--neon-cyan), var(--neon-lime))";
  }
}

function updateLevelUI(level) {
  $levelNum.textContent      = level.id;
  $missionEmoji.textContent  = level.emoji;
  $missionTitle.textContent  = level.title;
  $missionHint.textContent   = level.players >= 2
    ? `👥 ${level.hint}`
    : level.hint;
  document.getElementById("clear-level-tag").textContent = `LEVEL ${level.id} CLEAR!`;
  document.getElementById("clear-emoji-display").textContent = level.emoji;
  updateGuideOverlay(level);
  resetFXSmoothing();
  updateGauge(0);
  GameState.holdCount = 0;
  GameState.isCleared = false;
}

function updateScore() {
  $scoreVal.textContent = GameState.score;
}

async function handleClear() {
  GameState.isCleared = true;
  GameState.isRunning  = false;
  cancelAnimationFrame(GameState.animFrameId);

  GameState.score += 100;
  updateScore();

  const captureCanvas = document.createElement("canvas");
  captureCanvas.width  = $video.videoWidth;
  captureCanvas.height = $video.videoHeight;
  const captureCtx = captureCanvas.getContext("2d");
  captureCtx.translate(captureCanvas.width, 0);
  captureCtx.scale(-1, 1);
  captureCtx.drawImage($video, 0, 0);

  const captureDataUrl = captureCanvas.toDataURL("image/jpeg", 0.85);

  const $preview = document.getElementById("capture-preview");
  $preview.src = captureDataUrl;
  document.getElementById("capture-thumb-wrap").style.display = "block";

  spawnParticles();

  document.getElementById("clear-modal").classList.add("visible");

  const $nextBtn = document.getElementById("next-btn");
  if (GameState.currentLevelIndex >= LEVELS.length - 1) {
    $nextBtn.textContent = "🏆 全クリア！";
  } else {
    const next = LEVELS[GameState.currentLevelIndex + 1];
    $nextBtn.textContent = `LEVEL ${next.id} へ →`;
  }

  window._captureDataUrl = captureDataUrl;
}

function spawnParticles() {
  const colors = ["var(--neon-cyan)", "var(--neon-lime)", "var(--neon-pink)", "#fff"];
  const count  = 20;

  for (let i = 0; i < count; i++) {
    const el = document.createElement("div");
    el.className = "particle";

    const size  = Math.random() * 10 + 5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dx    = (Math.random() - 0.5) * 200;
    const dy    = (Math.random() - 0.8) * 200;
    const delay = Math.random() * 0.3;

    el.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${Math.random() * 100}vw;
      top:${Math.random() * 100}vh;
      --dx:${dx}px; --dy:${dy}px;
      animation-delay:${delay}s;
    `;

    document.body.appendChild(el);
    el.addEventListener("animationend", () => el.remove());
  }
}

async function shareResult() {
  const { text } = getSharePayload();

  try {
    if (navigator.share && window._captureDataUrl) {
      const response = await fetch(window._captureDataUrl);
      const blob     = await response.blob();
      const file     = new File([blob], "pose-game-clear.jpg", { type: "image/jpeg" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ text, files: [file] });
        return;
      }
    }

    if (navigator.share) {
      await navigator.share({ text });
      return;
    }
  } catch (err) {
    if (err.name === "AbortError") return;
    console.warn("[Share] Web Share API 失敗:", err);
  }

  try {
    await navigator.clipboard.writeText(text);
    alert("テキストをコピーしました！SNSに貼り付けてシェアしてください 📋");
  } catch (clipErr) {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    alert("テキストをコピーしました！SNSに貼り付けてシェアしてください 📋");
  }
}

function getSharePayload() {
  const level = currentLevel();
  const gameUrl = window.location.href.split("?")[0];
  const shareLine = level.shareText
    ? level.shareText
    : `LEVEL ${level.id}「${level.title}」${level.emoji}クリア！`;
  const text = `🎮 POSE\n${shareLine}\nスコア: ${GameState.score}点\n#POSE\n${gameUrl}`;
  return { level, gameUrl, text };
}

function downloadCaptureImage() {
  if (!window._captureDataUrl) return;
  const a = document.createElement("a");

  a.download = `pose-level${currentLevel().id}.jpg`;

async function shareToSNS(platform) {
  const { gameUrl, text } = getSharePayload();

  switch (platform) {
    case "line":

        "_blank", "noopener,noreferrer"

      break;
    case "x":

        `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(gameUrl)}`,
        "_blank", "noopener,noreferrer"
      );
      break;
    case "facebook":
      window.open(
        `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(gameUrl)}`,
        "_blank", "noopener,noreferrer"
      );
      break;
    case "instagram":
      downloadCaptureImage();
      alert("画像を保存しました。\nInstagramアプリを開き、ストーリーまたは投稿に画像を追加してください。");

    case "tiktok":

      break;
    case "native":
      await shareResult();
      break;
  }
}

async function startLevel(index) {
  GameState.currentLevelIndex = index;
  GameState.holdCount         = 0;
  GameState.isCleared         = false;
  GameState.isRunning         = false;
  lastTimestamp               = -1;

  cancelAnimationFrame(GameState.animFrameId);
  resetClearModalPreview();
  resetFXSmoothing();
  ctx.clearRect(0, 0, $canvas.width, $canvas.height);

  const level = currentLevel();
  const prevLevel = index > 0 ? LEVELS[index - 1] : null;

  const prevNeedsPose = prevLevel && (prevLevel.type === "pose" || prevLevel.type === "both");
  const nextNeedsPose = level.type === "pose" || level.type === "both";
  const prevNeedsFace = prevLevel && (prevLevel.type === "face" || prevLevel.type === "both");
  const nextNeedsFace = level.type === "face" || level.type === "both";

  if (prevNeedsPose && !nextNeedsPose) {
    releasePoseLandmarker();
  }
  if (prevNeedsFace && !nextNeedsFace) {
    releaseFaceLandmarker();
  }

  if (prevLevel && (prevLevel.type === "face" && (level.type === "pose" || level.type === "both"))) {
    setLoadingText("カメラ切替中...");
    showLoading(true);
    try {
      await restartCameraStream();
    } catch (err) {
      console.error("[Camera] 再取得失敗:", err);
      showLoading(false);
      return false;
    }
  }

  updateLevelUI(level);

  await resumeCamera();

  const loadingMsg = nextNeedsPose && nextNeedsFace
    ? "AI準備中..."
    : nextNeedsPose
      ? "ポーズAI準備中..."
      : "AI INITIALIZING...";
  setLoadingText(loadingMsg);
  const ready = await ensureDetectorForLevel(level);
  if (!ready) return false;

  if (level.id === 1 && !poseLandmarker) {
    ensurePoseLandmarker().catch(() => {});
  }

  GameState.isRunning = true;
  GameState.animFrameId = requestAnimationFrame(detectionLoop);
  return true;
}

async function goNextLevel() {
  document.getElementById("clear-modal").classList.remove("visible");
  resetClearModalPreview();

  if (GameState.currentLevelIndex < LEVELS.length - 1) {
    const started = await startLevel(GameState.currentLevelIndex + 1);
    if (!started) {
      document.getElementById("clear-modal").classList.add("visible");
    }
  } else {
    showAllClear();
  }
}

async function retryLevel() {
  document.getElementById("clear-modal").classList.remove("visible");
  resetClearModalPreview();
  const started = await startLevel(GameState.currentLevelIndex);
  if (!started) {
    document.getElementById("clear-modal").classList.add("visible");
  }
}

function resetStartScreen() {
  const screen = document.getElementById("start-screen");
  screen.querySelector(".logo-mark").textContent = "🤸";
  screen.querySelector(".game-title").textContent = "POSE";
  screen.querySelector(".game-subtitle").innerHTML =
    "カメラの前でポーズを決めるだけ！<br>AIがリアルタイムで判定します";
  document.getElementById("start-btn").textContent = "はじめる";
  document.getElementById("start-btn").disabled = false;
}

function showAllClear() {
  document.getElementById("clear-modal").classList.remove("visible");
  document.getElementById("app").style.display = "none";

  const screen = document.getElementById("start-screen");
  screen.style.display = "flex";
  screen.querySelector(".logo-mark").textContent = "🏆";
  screen.querySelector(".game-title").textContent = "全レベルクリア！";
  const finalScore = GameState.score;
  screen.querySelector(".game-subtitle").textContent =
    `スコア ${finalScore}点\nすべてのポーズをクリアしました！`;
  document.getElementById("start-btn").textContent = "もう一度遊ぶ";

  GameState.currentLevelIndex = 0;
  GameState.score = 0;
  updateScore();
}

function showLoading(visible) {
  const $overlay = document.getElementById("loading-overlay");
  if (visible) {
    $overlay.classList.add("visible");
  } else {
    $overlay.classList.remove("visible");
  }
}

document.getElementById("start-btn").addEventListener("click", async () => {
  const $startBtn = document.getElementById("start-btn");
  $startBtn.disabled = true;

  const isReplay = $startBtn.textContent === "もう一度遊ぶ";
  if (isReplay) {
    resetStartScreen();
    GameState.currentLevelIndex = 0;
    GameState.score = 0;
    updateScore();
  }

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";

  await startCamera();

  const started = await startLevel(0);
  if (!started) {
    document.getElementById("start-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
    $startBtn.disabled = false;
    return;
  }

  $startBtn.disabled = false;
});

document.getElementById("next-btn").addEventListener("click", goNextLevel);
document.getElementById("retry-btn").addEventListener("click", retryLevel);
document.getElementById("capture-thumb-wrap").addEventListener("click", openPhotoLightbox);
document.getElementById("photo-lightbox-close").addEventListener("click", closePhotoLightbox);
document.getElementById("photo-lightbox").addEventListener("click", (e) => {
  if (e.target.id === "photo-lightbox") closePhotoLightbox();
});
document.querySelectorAll(".sns-btn").forEach(btn => {
  btn.addEventListener("click", () => shareToSNS(btn.dataset.sns));
});

function init() {
  showCompatibilityResult(checkCompatibility());
  preloadMediaPipeLibrary();
  console.log("[App] 初期化完了 — STARTボタン待機中");
}

if (window.MP) {
  init();
} else {
  window.addEventListener("mediapipe-ready", init, { once: true });
}
</script>
</body>
</html>
